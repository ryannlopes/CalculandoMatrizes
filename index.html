<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <title>Trabalho de Matetica</title>
</head>

<body>
    <!-- Como um span -->
    <nav class="navbar navbar-light bg-light">
        <span class="navbar-brand mb-0 h1">Matemática Computacional</span>
    </nav>
    <!-- Botão que irá abrir o modal -->
    <button type="button" class="btn btn-success btn-lg mt-2 ml-2" data-toggle="modal" data-target="#m2">Matriz
        2x2</button>
    <button type="button" class="btn btn-primary btn-lg mt-2 ml-2" data-toggle="modal" data-target="#m3">Matriz
        3x3</button>

    <!-- Modal -->
    <div id="m2" class="modal fade" role="dialog">
        <div class="modal-dialog">

            <!-- Modal da matriz 2x2 -->
            <!-- Conteúdo do modal-->
            <div class="modal-content">

                <!-- Cabeçalho do modal -->
                <div class="modal-header">
                    <h4 class="modal-title">Matriz 2x2</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>

                <!-- Corpo do modal -->
                <div class="modal-body">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a11"><br>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a12"><br>
                            </div>
                        </div>
                    </div>
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a21"><br>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a22"><br>
                            </div>
                        </div>
                    </div>

                    <!-- Rodapé do modal-->
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-dismiss="modal">Fechar</button>
                        <button type="button" class="btn btn-primary">Calcular o Determinante</button>
                        <button type="button" class="btn btn-primary">Calcular o Sistema</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal da matriz 3x3 -->
    <!-- Modal -->
    <div id="m3" class="modal fade" role="dialog">
        <div class="modal-dialog">

            <!-- Conteúdo do modal-->
            <div class="modal-content">
                <!-- Cabeçalho do modal -->
                <div class="modal-header">
                    <h4 class="modal-title">Matriz 3x3</h4>
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>

                <!-- Corpo do modal -->
                <div class="modal-body">
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a11"><br>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a12"><br>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a13"><br>
                            </div>
                        </div>
                    </div>
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a21"><br>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a22"><br>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a23"><br>
                            </div>
                        </div>
                    </div>
                    <div class="container-fluid">
                        <div class="row">
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a31"><br>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a32"><br>
                            </div>
                            <div class="col-md-4">
                                <input type="text" class="form-control" placeholder="a33"><br>
                            </div>
                        </div>
                    </div>

                    <!-- Rodapé do modal-->
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-dismiss="modal">Fechar</button>
                        <button type="button" class="btn btn-primary">Calcular o Determinante</button>
                        <button type="button" class="btn btn-primary">Calcular o Sistema</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>

</html>
