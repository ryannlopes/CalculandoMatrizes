<script>
    let x1 = 1, y1 = 2, z1 = 1, i1 = 7, x2 = 2, y2 = 7, z2 = 1, i2 = 21, x3 = -3, y3 = -5, z3 = 2, i3 = -8;

    calculaSistemaComTresElementos(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3);

    function calculaSistemaComTresElementos(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3) {
        let _x1 = x1 || 0;
        let _x2 = x2 || 0;
        let _x3 = x3 || 0;

        let _y1 = y1 || 0;
        let _y2 = y2 || 0;
        let _y3 = y3 || 0;

        let _z1 = z1 || 0;
        let _z2 = z2 || 0;
        let _z3 = z3 || 0;

        let _i1 = i1 || 0;
        let _i2 = i2 || 0;
        let _i3 = i3 || 0;

        let determinateDeMatriz = calculaDeterminateDeMatriz(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3);
        let determinateDeMatrizX = calculaDeterminateDeMatrizX(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3);
        let determinateDeMatrizY = calculaDeterminateDeMatrizY(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3);
        let determinateDeMatrizZ = calculaDeterminateDeMatrizZ(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3);
        let x = calculaX(determinateDeMatrizX, determinateDeMatriz);
        let y = calculaY(determinateDeMatrizY, determinateDeMatriz);
        let z = calculaZ(determinateDeMatrizZ, determinateDeMatriz);

        console.log(`Conjunto Solução = { ${x}, ${y}, ${z} }`);
    }

    function calculaDeterminateDeMatriz(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3) {
        return (x1 * y2 * z3) + (y1 * z2 * x3) + (z1 * x2 * y3) - 1 * (x3 * y2 * z1) - 1 * (y3 * z2 * x1) - 1 * (z3 * x2 * y1);
    }

    function calculaDeterminateDeMatrizX(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3) {
        return (i1 * y2 * z3) + (y1 * z2 * i3) + (z1 * i2 * y3) - 1 * (i3 * y2 * z1) - 1 * (y3 * z2 * i1) - 1 * (z3 * i2 * y1);
    }

    function calculaDeterminateDeMatrizY(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3) {
        return (x1 * i2 * z3) + (i1 * z2 * x3) + (z1 * x2 * i3) - 1 * (x3 * i2 * z1) - 1 * (i3 * z2 * x1) - 1 * (z3 * x2 * i1);
    }

    function calculaDeterminateDeMatrizZ(x1, y1, z1, i1, x2, y2, z2, i2, x3, y3, z3, i3) {
        return (x1 * y2 * i3) + (y1 * i2 * x3) + (i1 * x2 * y3) - 1 * (x3 * y2 * i1) - 1 * (y3 * i2 * x1) - 1 * (i3 * x2 * y1);
    }

    function calculaX(determinateDeMatrizX, determinateDeMatriz) {
        return determinateDeMatrizX / determinateDeMatriz;
    }

    function calculaY(determinateDeMatrizY, determinateDeMatriz) {
        return determinateDeMatrizY / determinateDeMatriz;
    }

    function calculaZ(determinateDeMatrizZ, determinateDeMatriz) {
        return determinateDeMatrizZ / determinateDeMatriz;
    }
</script>
